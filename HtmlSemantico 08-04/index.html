<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <title>HTML Semântico</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grupo">
        <header class="cabecalho">
            <h1>Site Semântico</h1>
            <nav class="menu">
                <a href="#">Início</a>
                <a href="#">Sobre</a>
                <a href="#">Contato</a>
            </nav>
        </header>
        <div class="conteudo">
            <nav class="navegacao">
                <h2>Menu Lateral</h2>
                <ul>
                    <li>Perfil</li>
                    <li>Configuração</li>
                    <li>Ajuda</li>
                </ul>
            </nav>
            <section class="secao">
                <h3>Painel Princiapal</h3>
                <p>Nome: <span id="nomeUsuario">Robson</span></p>
                <p>Curso: <span id="nomeCurso">Desnvolvimento Web Front-End</span></p>
                <p>Status: <span id="nomeStatus">Ativo</span></p>
                <hr>
                <h3>Alterar nome</h3>
                <div>
                    <input type="text" name="inputNome" id="inputNome">
                    <button onclick="alterarNome()">Alterar nome</button>
                    
                </div>
                <h3>Alterar curso</h3>
                <div>
                    <input type="text" name="inputCurso" id="inputCurso">
                     <button onclick="alterarCurso()">Alterar curso</button>
                </div>
                <h3>Alterar status</h3>
                <div>
                    <input type="text" name="inputStatus" id="inputStatus">
                    <button onclick="alterarStatus()">Atualizar Status</button>
                </div>
            </section>
        </div>

        <footer class="rodape">
